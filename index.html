<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="player">
      <div class="video-wrapper">
        <video class="video">
          <source src="./Sequence 02.mp4" type="video/mp4" />
        </video>
      </div>

      <!-- CONTROLS -->
      <div class="controls">
        <!-- TOP -->
        <div class="timeline-container">
          <div class="timeline">
            <div class="progress"></div>
          </div>
        </div>

        <!-- BOTTOM -->
        <div class="controls-bottom">
          <!-- LEFT -->
          <div class="left-controls">
            <button class="control-btn play-btn">Play</button>

            <div class="time">
              <span class="current-time">00:00</span>
              /
              <span class="duration">00:00</span>
            </div>
          </div>

          <!-- RIGHT -->
          <div class="right-controls">
            <button class="control-btn mute-btn">Volume</button>

            <input
              type="range"
              class="volume-slider"
              min="0"
              max="100"
              value="100"
            />
            <button class="control-btn fullscreen-btn">Fullscreen</button>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
